<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Relationship Graph — GLPO Node Features</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg-color: #0d0822;
      --panel-bg: rgba(18, 10, 36, 0.75);
      --panel-border: rgba(140, 120, 255, 0.22);
      --text-color: #e0d8f0;
      --text-muted: rgba(224, 216, 240, 0.6);
      --accent-color: #8c78ff;
      --font-family: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-color);
      font-family: var(--font-family);
      overflow: hidden;
      color: var(--text-color);
      user-select: none;
    }
    
    canvas {
      display: block;
      cursor: grab;
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
    }
    canvas:active { cursor: grabbing; }

    #sidebar {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 350px;
      max-height: calc(100vh - 32px);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.65);
      z-index: 50;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(140, 120, 255, 0.3) transparent;
    }

    #sidebar::-webkit-scrollbar {
      width: 6px;
    }
    #sidebar::-webkit-scrollbar-thumb {
      background: rgba(140, 120, 255, 0.3);
      border-radius: 3px;
    }
    #sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(140, 120, 255, 0.5);
    }

    .sidebar-section {
      border-bottom: 1px solid rgba(140, 120, 255, 0.15);
      padding-bottom: 20px;
    }
    .sidebar-section:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    #search {
      width: 100%;
      background: rgba(10, 5, 25, 0.6);
      border: 1px solid rgba(140, 120, 255, 0.3);
      color: var(--text-color);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: var(--font-family);
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    #search:focus {
      border-color: rgba(140, 120, 255, 0.8);
      box-shadow: 0 0 12px rgba(140, 120, 255, 0.25), inset 0 2px 4px rgba(0,0,0,0.3);
    }
    #search::placeholder { color: rgba(200, 184, 255, 0.35); }

    .search-results-list {
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(140, 120, 255, 0.05);
      transition: all 0.15s ease;
      border: 1px solid transparent;
    }
    .search-result-item:hover {
      background: rgba(140, 120, 255, 0.15);
      border-color: rgba(140, 120, 255, 0.25);
    }
    .result-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .result-details {
      display: flex;
      flex-direction: column;
    }
    .result-label {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }
    .result-group {
      font-size: 10px;
      opacity: 0.7;
    }
    .search-no-results {
      font-size: 11px;
      color: var(--text-muted);
      padding: 8px;
      text-align: center;
    }

    /* Inspector styles */
    .inspector-welcome {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
      font-style: italic;
      line-height: 1.6;
    }
    .inspector-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .inspector-header {
      padding-left: 12px;
      margin-bottom: 4px;
    }
    .group-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 6px;
    }
    .inspector-node-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    .inspector-desc {
      font-size: 12.5px;
      line-height: 1.5;
      color: rgba(224, 216, 240, 0.85);
      background: rgba(0, 0, 0, 0.25);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .inspector-actions {
      display: flex;
      gap: 8px;
    }
    
    .inspector-connections {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .conn-title {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .conn-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 130px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .conn-list::-webkit-scrollbar {
      width: 4px;
    }
    .conn-list::-webkit-scrollbar-thumb {
      background: rgba(140, 120, 255, 0.2);
      border-radius: 2px;
    }
    .conn-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 11px;
    }
    .conn-item:hover {
      background: rgba(140, 120, 255, 0.08);
      transform: translateX(3px);
    }
    .conn-label {
      font-weight: 500;
      color: #eae5f5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }
    .conn-type-badge {
      font-size: 8px;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .conn-type-badge.cost { background: rgba(245, 166, 35, 0.2); color: #f5a623; }
    .conn-type-badge.time { background: rgba(69, 183, 209, 0.2); color: #45b7d1; }
    .conn-type-badge.risk { background: rgba(255, 138, 92, 0.2); color: #ff8a5c; }
    .conn-type-badge.resource { background: rgba(240, 147, 251, 0.2); color: #f093fb; }
    .conn-type-badge.quality { background: rgba(0, 210, 255, 0.2); color: #00d2ff; }
    .conn-type-badge.structural { background: rgba(161, 140, 209, 0.2); color: #a18cd1; }

    .no-conn {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      padding-left: 6px;
    }

    /* Sliders and general controls */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #c8b8ff;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .control-group label {
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
    }
    .control-group label span {
      font-family: monospace;
      color: #c8b8ff;
      font-weight: bold;
    }
    .control-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(140, 120, 255, 0.15);
      outline: none;
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #8c78ff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(140, 120, 255, 0.5);
      transition: transform 0.1s ease;
    }
    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.25);
    }

    /* Legend style */
    #legend {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 270px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 12px;
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.65);
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      z-index: 50;
      scrollbar-width: thin;
      scrollbar-color: rgba(140, 120, 255, 0.25) transparent;
    }
    #legend::-webkit-scrollbar {
      width: 4px;
    }
    #legend::-webkit-scrollbar-thumb {
      background: rgba(140, 120, 255, 0.25);
      border-radius: 2px;
    }
    #legend h3 {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #c8b8ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(140, 120, 255, 0.15);
      padding-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .legend-item:hover {
      background: rgba(140, 120, 255, 0.08);
    }
    .legend-item.dimmed { opacity: 0.25; }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      font-size: 11px;
      font-weight: 500;
      color: #eae5f5;
    }

    /* Controls buttons */
    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 50;
    }
    #controls button, .inspector-actions button {
      background: rgba(140, 120, 255, 0.12);
      border: 1px solid rgba(140, 120, 255, 0.35);
      color: #c8b8ff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-family);
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #controls button:hover, .inspector-actions button:hover {
      background: rgba(140, 120, 255, 0.28);
      border-color: rgba(140, 120, 255, 0.65);
      box-shadow: 0 0 12px rgba(140, 120, 255, 0.3);
    }

    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(12, 6, 28, 0.95);
      border: 1px solid rgba(140, 120, 255, 0.45);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      max-width: 300px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      display: none;
      z-index: 100;
      line-height: 1.5;
    }
    #tooltip .tt-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #tooltip .tt-group {
      font-size: 10px;
      opacity: 0.65;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #tooltip .tt-desc {
      font-size: 11.5px;
      opacity: 0.85;
      color: #eae5f5;
    }

    /* Table View Dashboard Styles */
    #table-container {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      background: rgba(10, 6, 24, 0.95);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 24px;
      z-index: 60;
      backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .table-header-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(140, 120, 255, 0.18);
      padding-bottom: 16px;
      gap: 20px;
    }
    .table-header-section h2 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 0 12px rgba(140, 120, 255, 0.3);
    }
    .table-filters {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #table-search {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(140, 120, 255, 0.3);
      color: var(--text-color);
      padding: 9px 14px;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 13px;
      outline: none;
      width: 260px;
      transition: all 0.2s;
    }
    #table-search:focus {
      border-color: rgba(140, 120, 255, 0.8);
      box-shadow: 0 0 10px rgba(140, 120, 255, 0.25);
    }
    #table-search::placeholder { color: rgba(200, 184, 255, 0.35); }

    #table-filter-group {
      background: rgba(10, 6, 24, 0.9);
      border: 1px solid rgba(140, 120, 255, 0.3);
      color: var(--text-color);
      padding: 9px 14px;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    #table-filter-group:hover {
      border-color: rgba(140, 120, 255, 0.5);
    }

    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      border-radius: 12px;
      border: 1px solid rgba(140, 120, 255, 0.15);
      background: rgba(0, 0, 0, 0.15);
      scrollbar-width: thin;
      scrollbar-color: rgba(140, 120, 255, 0.3) transparent;
    }
    .table-wrapper::-webkit-scrollbar {
      width: 6px;
    }
    .table-wrapper::-webkit-scrollbar-thumb {
      background: rgba(140, 120, 255, 0.3);
      border-radius: 3px;
    }
    
    #features-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      text-align: left;
    }
    #features-table th, #features-table td {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(140, 120, 255, 0.1);
    }
    #features-table th {
      background: rgba(22, 12, 45, 0.95);
      color: #c8b8ff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: 2px solid rgba(140, 120, 255, 0.25);
    }
    #features-table tbody tr {
      transition: background 0.15s ease;
    }
    #features-table tbody tr:hover {
      background: rgba(140, 120, 255, 0.05);
    }
    .table-badge {
      font-size: 9.5px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      display: inline-block;
      letter-spacing: 0.3px;
    }
    .table-view-btn {
      background: rgba(140, 120, 255, 0.12);
      border: 1px solid rgba(140, 120, 255, 0.35);
      color: #c8b8ff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 11px;
      transition: all 0.2s;
    }
    .table-view-btn:hover {
      background: rgba(140, 120, 255, 0.28);
      border-color: rgba(140, 120, 255, 0.65);
      box-shadow: 0 0 10px rgba(140, 120, 255, 0.35);
    }
    
  </style>
</head>
<body>
  <canvas id="graph"></canvas>
  
  <div id="sidebar">
    <!-- Search section -->
    <div class="sidebar-section">
      <div id="search-container">
        <input type="text" id="search" placeholder="🔍 Tìm kiếm đặc trưng..." autocomplete="off" />
        <div id="search-results" class="search-results-list"></div>
      </div>
    </div>
    
    <!-- Inspector section -->
    <div id="inspector" class="sidebar-section">
      <div class="inspector-welcome">
        Click vào một nút để xem phân tích chi tiết, các mối liên kết và ghim định vị.
      </div>
    </div>
    
    <!-- Physics control panel -->
    <div class="sidebar-section">
      <h4 class="section-title">⚡ Cấu hình Vật lý</h4>
      <div class="control-group">
        <label>Lực đẩy (Repulsion): <span id="val-repulsion">800</span></label>
        <input type="range" id="param-repulsion" min="100" max="3000" step="50" value="800" />
      </div>
      <div class="control-group">
        <label>Lực hút (Attraction): <span id="val-attraction">0.008</span></label>
        <input type="range" id="param-attraction" min="0.001" max="0.05" step="0.001" value="0.008" />
      </div>
      <div class="control-group">
        <label>Chiều dài cạnh: <span id="val-edgeLength">120</span></label>
        <input type="range" id="param-edgeLength" min="40" max="300" step="10" value="120" />
      </div>
      <div class="control-group">
        <label>Độ cản (Damping): <span id="val-damping">0.92</span></label>
        <input type="range" id="param-damping" min="0.5" max="0.99" step="0.01" value="0.92" />
      </div>
      <div class="control-group">
        <label>Tránh đè nút (Collision): <span id="val-collision">30</span></label>
        <input type="range" id="param-collision" min="10" max="100" step="5" value="30" />
      </div>
    </div>
  </div>
  
  <div id="legend">
    <h3>📊 Nhóm Đặc trưng (12)</h3>
  </div>

  <div id="controls">
    <button onclick="resetView()">🔄 Đặt lại Góc nhìn</button>
    <button onclick="toggleLabels()">🏷️ Hiện/Ẩn Nhãn</button>
    <button onclick="togglePhysics()">⚡ Bật/Tắt Vật lý</button>
    <button onclick="toggleViewMode()" id="btn-view-mode" style="background: rgba(140, 120, 255, 0.15); border-color: rgba(140, 120, 255, 0.5);">📊 Dạng Bảng</button>
  </div>

  <div id="stats"></div>
  <div id="tooltip"></div>

  <!-- Table View Overlay Layout -->
  <div id="table-container" style="display: none;">
    <div class="table-header-section">
      <h2>📋 Danh Sách Thống Kê Đặc Trưng (72)</h2>
      <div class="table-filters">
        <input type="text" id="table-search" placeholder="🔍 Lọc danh sách..." autocomplete="off" />
        <select id="table-filter-group" onchange="filterTable()">
          <option value="all">Tất cả các nhóm</option>
        </select>
      </div>
    </div>
    <div class="table-wrapper">
      <table id="features-table">
        <thead>
          <tr>
            <th style="width: 50px;">ID</th>
            <th style="width: 200px;">Yếu tố</th>
            <th style="width: 150px;">Nhóm</th>
            <th>Mô tả</th>
            <th style="width: 120px;">Đơn vị đo</th>
            <th style="width: 180px;">Nguồn tham chiếu</th>
            <th style="width: 110px; text-align: center;">Liên kết (Đến|Đi)</th>
            <th style="width: 100px; text-align: center;">Hành động</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>
  </div>

  <script>
  // ============================================================
  // DATA: 91 Features organized into 12 groups with relationships
  // ============================================================
  const GROUPS = [
    { id: 0,  name: "Chi phí Trực tiếp",         color: "#f5a623", short: "CP Trực tiếp" },
    { id: 1,  name: "Chi phí Gián tiếp",          color: "#b0b8c0", short: "CP Gián tiếp" },
    { id: 2,  name: "Chi phí Cơ hội & Chìm",      color: "#7ed321", short: "CP Cơ hội" },
    { id: 3,  name: "Chi phí Hợp đồng & Pháp lý", color: "#ff6b6b", short: "Hợp đồng & Pháp lý" },
    { id: 4,  name: "Chi phí Logistics & SCM",     color: "#4ecdc4", short: "Hậu cần & SCM" },
    { id: 5,  name: "Yếu tố Thời gian",           color: "#45b7d1", short: "Thời gian" },
    { id: 6,  name: "Yếu tố Tài nguyên",          color: "#f093fb", short: "Tài nguyên" },
    { id: 7,  name: "Cấu trúc Đồ thị",            color: "#a18cd1", short: "Cấu trúc Đồ thị" },
    { id: 8,  name: "Rủi ro & Bất định",           color: "#ff8a5c", short: "Rủi ro" },
    { id: 9,  name: "Chất lượng & Giá trị",        color: "#00d2ff", short: "CP Chất lượng" },
    { id: 10, name: "Con người & Tổ chức",         color: "#ffd93d", short: "Nhân sự & Tổ chức" },
    { id: 11, name: "ESG",                         color: "#6bcb77", short: "ESG" },
  ];

  const REL_NAMES = {
    cost: "Chi phí",
    time: "Thời gian",
    risk: "Rủi ro",
    resource: "Tài nguyên",
    quality: "Chất lượng",
    structural: "Cấu trúc"
  };

    [7, 8, "risk"], // Nhân công Nội bộ ⚔️ Thuê ngoài (Subcontracting) - Lựa chọn thay thế
    [25, 27, "risk"], // Tồn kho nhiều (Holding) ⚔️ Rủi ro Thiếu hụt (Shortage) giảm đi
    [37, 41, "risk"], // Yêu cầu tài nguyên cao ⚔️ Khả năng thay thế tài nguyên giảm
    [39, 9, "risk"], // Năng suất cao ⚔️ Ít phải làm thêm giờ (OT)
    [55, 58, "risk"], // Tác động Môi trường cao ⚔️ Mất Tín chỉ Carbon
    [60, 62, "risk"], // Độ linh hoạt lịch trình cao ⚔️ Giảm thiểu Thiệt hại khi trễ hạn
    [70, 71, "risk"], // CPI (Chi phí) ⚔️ SPI (Tiến độ) - Đẩy nhanh tiến độ thường tốn kém hơn
    
    // --- Các Liên kết Hệ thống AI & Đồ thị (Đã phân tích kỹ) ---
    [63, 44, "structural"], // Bậc vào (In-degree) lớn → Phụ thuộc nhiều task trước → Phụ thuộc ngoại vi cao
    [64, 62, "structural"], // Bậc ra (Out-degree) lớn → Lỗi trễ hạn lan truyền → Thiệt hại trễ (Delay Impact) khổng lồ
    [65, 45, "structural"], // Nằm trên Đường găng (Critical) → Đốt Quỹ dự phòng nhanh hơn nếu có biến
    [65, 9, "structural"], // Nằm trên Đường găng (Critical) → Thường xuyên bị ép làm thêm giờ (Crashing)
    [65, 43, "structural"], // Nằm trên Đường găng (Critical) → Áp lực tiến độ dễ dẫn đến Làm lại (Rework)
    [65, 66, "risk"],       // Đường găng (Critical) ⚔️ Float = 0 (Nghịch đảo tuyệt đối)
    [66, 60, "structural"], // Float lớn → Độ linh hoạt lịch trình (Flexibility) cực cao
    [67, 62, "structural"], // Chiều dài đường đi dài → Gần mốc bàn giao → Thiệt hại trễ cực lớn
    [68, 69, "structural"], // Ngân sách Kế hoạch (PV) là cơ sở tham chiếu của EV
    [70, 45, "risk"],       // CPI Tốt (Hiệu quả chi phí) ⚔️ Ít phải dùng đến Quỹ dự phòng
    [71, 9, "risk"],        // SPI Tốt (Vượt tiến độ) ⚔️ Không cần làm thêm giờ (OT)
  ];

  // ============================================================
  // BUILD DATA STRUCTURES
  // ============================================================
  const nodes = NODES_RAW.map(([id, label, group, rawDesc]) => {
    // Parse the combined description string
    const englishMatch = rawDesc.match(/Tiếng Anh:\s*([^.]+)\./);
    const englishName = englishMatch ? englishMatch[1].trim() : "";
    
    const unitMatch = rawDesc.match(/Đơn vị:\s*([^.]+)\./);
    const unitOfMeasure = unitMatch ? unitMatch[1].trim() : "";
    
    const sourceMatch = rawDesc.match(/Nguồn:\s*(.+)$/);
    const sourceRef = sourceMatch ? sourceMatch[1].trim() : "";
    
    let cleanDesc = rawDesc;
    cleanDesc = cleanDesc.replace(/Tiếng Anh:\s*[^.]+\.\s*/, "");
    cleanDesc = cleanDesc.replace(/Đơn vị:\s*[^.]+\.\s*/, "");
    cleanDesc = cleanDesc.replace(/Nguồn:\s*(.+)$/, "");
    cleanDesc = cleanDesc.trim();

    return {
      id,
      label,
      group,
      english: englishName,
      desc: cleanDesc,
      unit: unitOfMeasure,
      source: sourceRef,
      rawDesc: rawDesc,
      x: 0, y: 0,
      vx: 0, vy: 0,
      radius: 6,
      visible: true,
      pinned: false
    };
  });

  const edges = EDGES_RAW.map(([s, t, type]) => ({
    source: s, target: t, type
  }));

  // ============================================================
  // CANVAS & STATE
  // ============================================================
  const canvas = document.getElementById('graph');
  const ctx = canvas.getContext('2d');
  let W, H;
  let showLabels = false;
  let physicsOn = true;
  
  let hoveredNode = null;
  let draggedNode = null;
  let selectedNode = null;
  
  let searchTerm = "";
  let highlightedGroup = null;

  // Camera state
  let cam = { x: 0, y: 0, zoom: 0.7 };
  let targetCam = null; // for smooth movements

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Convert screen coordinates to world coordinates
  function screenToWorld(mx, my) {
    const wx = (mx - W / 2) / cam.zoom + cam.x;
    const wy = (my - H / 2) / cam.zoom + cam.y;
    return { x: wx, y: wy };
  }

  // ============================================================
  // LEGEND INIT
  // ============================================================
  const legendEl = document.getElementById('legend');
  GROUPS.forEach(g => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<span class="legend-dot" style="background:${g.color}; box-shadow: 0 0 8px ${g.color}90"></span><span class="legend-label">${g.name} (${NODES_RAW.filter(n=>n[2]===g.id).length})</span>`;
    div.addEventListener('click', () => {
      if (highlightedGroup === g.id) {
        highlightedGroup = null;
        document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('dimmed'));
      } else {
        highlightedGroup = g.id;
        document.querySelectorAll('.legend-item').forEach(el => el.classList.add('dimmed'));
        div.classList.remove('dimmed');
        
        // Center camera on the average position of nodes in this group
        const groupNodes = nodes.filter(n => n.group === g.id);
        if (groupNodes.length > 0) {
          let avgX = 0, avgY = 0;
          groupNodes.forEach(n => { avgX += n.x; avgY += n.y; });
          avgX /= groupNodes.length;
          avgY /= groupNodes.length;
          
          targetCam = {
            x: avgX,
            y: avgY,
            zoom: 0.9,
            startX: cam.x,
            startY: cam.y,
            startZoom: cam.zoom,
            progress: 0
          };
        }
      }
    });
    legendEl.appendChild(div);
  });

  // ============================================================
  // FORCE SIMULATION
  // ============================================================
  const SIM = {
    repulsion: 800,
    attraction: 0.008,
    damping: 0.92,
    centerPull: 0.003,
    edgeLength: 120,
    collisionRadius: 30
  };

  // Sync sliders with SIM values
  const sliders = [
    { id: 'repulsion', param: 'repulsion' },
    { id: 'attraction', param: 'attraction' },
    { id: 'edgeLength', param: 'edgeLength' },
    { id: 'damping', param: 'damping' },
    { id: 'collision', param: 'collisionRadius' }
  ];

  sliders.forEach(s => {
    const el = document.getElementById(`param-${s.id}`);
    const valEl = document.getElementById(`val-${s.id}`);
    if (el && valEl) {
      el.addEventListener('input', e => {
        const val = parseFloat(e.target.value);
        SIM[s.param] = val;
        valEl.textContent = val;
      });
    }
  });

  function simulate() {
    if (!physicsOn) return;
    const N = nodes.length;

    // Repulsion
    for (let i = 0; i < N; i++) {
      if (!nodes[i].visible) continue;
      for (let j = i + 1; j < N; j++) {
        if (!nodes[j].visible) continue;
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = SIM.repulsion / (dist * dist);
        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        
        nodes[i].vx -= fx;
        nodes[i].vy -= fy;
        nodes[j].vx += fx;
        nodes[j].vy += fy;
      }
    }

    // Attraction along edges
    for (const e of edges) {
      const a = nodes[e.source];
      const b = nodes[e.target];
      if (!a.visible || !b.visible) continue;
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = (dist - SIM.edgeLength) * SIM.attraction;
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      
      a.vx += fx;
      a.vy += fy;
      b.vx -= fx;
      b.vy -= fy;
    }

    // Collision avoidance (avoid node overlap)
    const rCollision = SIM.collisionRadius;
    for (let i = 0; i < N; i++) {
      if (!nodes[i].visible) continue;
      for (let j = i + 1; j < N; j++) {
        if (!nodes[j].visible) continue;
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        
        if (dist < rCollision) {
          let overlap = rCollision - dist;
          let force = overlap * 0.15; 
          let fx = (dx / dist) * force;
          let fy = (dy / dist) * force;
          
          if (!nodes[i].pinned && nodes[i] !== draggedNode) {
            nodes[i].vx -= fx;
            nodes[i].vy -= fy;
          }
          if (!nodes[j].pinned && nodes[j] !== draggedNode) {
            nodes[j].vx += fx;
            nodes[j].vy += fy;
          }
        }
      }
    }

    // Center gravity (pull to world origin 0,0)
    for (const n of nodes) {
      if (!n.visible) continue;
      n.vx += (0 - n.x) * SIM.centerPull;
      n.vy += (0 - n.y) * SIM.centerPull;
    }

    // Integration & position update
    for (const n of nodes) {
      if (n === draggedNode || n.pinned) continue;
      n.vx *= SIM.damping;
      n.vy *= SIM.damping;
      n.x += n.vx;
      n.y += n.vy;
    }
  }

  // ============================================================
  // RENDERING
  // ============================================================
  const EDGE_COLORS = {
    cost: "rgba(245, 166, 35, 0.35)",
    time: "rgba(69, 183, 209, 0.35)",
    risk: "rgba(255, 138, 92, 0.35)",
    resource: "rgba(240, 147, 251, 0.35)",
    quality: "rgba(0, 210, 255, 0.35)",
    structural: "rgba(161, 140, 209, 0.35)",
  };
  const EDGE_COLORS_HL = {
    cost: "rgba(245, 166, 35, 0.95)",
    time: "rgba(69, 183, 209, 0.95)",
    risk: "rgba(255, 138, 92, 0.95)",
    resource: "rgba(240, 147, 251, 0.95)",
    quality: "rgba(0, 210, 255, 0.95)",
    structural: "rgba(161, 140, 209, 0.95)",
  };

  // Draw arrow representing a directed relationship
  function drawArrow(ctx, x1, y1, x2, y2, arrowRadius = 7, isHL = false, targetRadius = 6) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 25) return; 
    
    const ux = dx / len;
    const uy = dy / len;
    
    // Offset target end point so arrow tip touches target node's boundary
    const offset = targetRadius + 1.5;
    const ax = x2 - ux * offset;
    const ay = y2 - uy * offset;
    
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(ax, ay);
    ctx.stroke();
    
    // Draw arrowhead pointing to target
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - arrowRadius * Math.cos(angle - Math.PI / 5.5), ay - arrowRadius * Math.sin(angle - Math.PI / 5.5));
    ctx.lineTo(ax - arrowRadius * Math.cos(angle + Math.PI / 5.5), ay - arrowRadius * Math.sin(angle + Math.PI / 5.5));
    ctx.closePath();
    ctx.fillStyle = ctx.strokeStyle;
    ctx.fill();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Deep radial space background gradient
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H)*0.75);
    bg.addColorStop(0, "#191136");
    bg.addColorStop(1, "#090518");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Determine nodes and edges highlighted by active selection/hover
    const connectedSet = new Set();
    const connectedEdges = new Set();
    const activeNode = selectedNode || hoveredNode;
    
    if (activeNode !== null) {
      connectedSet.add(activeNode.id);
      edges.forEach((e, idx) => {
        if (e.source === activeNode.id || e.target === activeNode.id) {
          connectedSet.add(e.source);
          connectedSet.add(e.target);
          connectedEdges.add(idx);
        }
      });
    }
    const hasActive = activeNode !== null;

    // Search matches set
    const searchSet = new Set();
    if (searchTerm.length > 0) {
      nodes.forEach(n => {
        if (n.label.toLowerCase().includes(searchTerm) || 
            n.desc.toLowerCase().includes(searchTerm) ||
            (n.english && n.english.toLowerCase().includes(searchTerm))) {
          searchSet.add(n.id);
        }
      });
    }

    // Save context and apply camera transforms
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);

    // 1. Draw Edges
    edges.forEach((e, idx) => {
      const a = nodes[e.source];
      const b = nodes[e.target];
      if (!a.visible || !b.visible) return;

      const isHL = hasActive && connectedEdges.has(idx);
      
      const dimByActive = hasActive && !isHL;
      const dimByGroup = highlightedGroup !== null && a.group !== highlightedGroup && b.group !== highlightedGroup;
      const dimBySearch = searchTerm.length > 0 && !searchSet.has(a.id) && !searchSet.has(b.id);

      if (dimByActive) {
        ctx.globalAlpha = 0.04; // Slightly higher so not completely transparent
      } else if (dimByGroup || dimBySearch) {
        ctx.globalAlpha = 0.07;
      } else {
        ctx.globalAlpha = 1;
      }

      ctx.strokeStyle = isHL ? (EDGE_COLORS_HL[e.type] || "rgba(140,120,255,0.9)") : (EDGE_COLORS[e.type] || "rgba(140,120,255,0.32)");
      ctx.lineWidth = isHL ? 3.0 : 1.2;
      
      // Calculate target node's actual drawn radius
      const isTargetSelected = selectedNode && b.id === selectedNode.id;
      const isTargetHovered = hoveredNode && b.id === hoveredNode.id;
      const isTargetConnected = activeNode && connectedSet.has(b.id);
      let targetRadius = isTargetSelected ? 12 : (isTargetHovered ? 10 : (isTargetConnected ? 8 : 6));
      if (searchTerm.length > 0 && searchSet.has(b.id)) targetRadius = 9.5;

      const arrowSize = isHL ? 9.5 : 6.5; 
      
      drawArrow(ctx, a.x, a.y, b.x, b.y, arrowSize, isHL, targetRadius);
    });
    ctx.globalAlpha = 1;

    // 2. Draw Nodes
    for (const n of nodes) {
      if (!n.visible) continue;

      const isSelected = selectedNode && n.id === selectedNode.id;
      const isHovered = hoveredNode && n.id === hoveredNode.id;
      const isConnected = activeNode && connectedSet.has(n.id);
      const isSearchMatch = searchSet.has(n.id);
      
      const dimByActive = hasActive && !isConnected;
      const dimByGroup = highlightedGroup !== null && n.group !== highlightedGroup;
      const dimBySearch = searchTerm.length > 0 && !isSearchMatch;

      const group = GROUPS[n.group];
      let r = isSelected ? 12 : (isHovered ? 10 : (isConnected ? 8 : 6));
      if (isSearchMatch && searchTerm.length > 0) r = 9.5;

      if (dimByActive) {
        ctx.globalAlpha = 0.15;
      } else if (dimByGroup || dimBySearch) {
        ctx.globalAlpha = 0.15;
      } else {
        ctx.globalAlpha = 1;
      }

      // Draw shadow glow for active nodes
      if (isSelected || isHovered || isSearchMatch) {
        ctx.shadowColor = group.color;
        ctx.shadowBlur = 18;
      } else if (isConnected) {
        ctx.shadowColor = group.color;
        ctx.shadowBlur = 10;
      }

      ctx.fillStyle = group.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0; // reset shadow

      // Draw borders for selected/hovered/pinned states
      if (isSelected) {
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2.5;
        ctx.stroke();
      } else if (n.pinned) {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 1.8;
        ctx.stroke();
        
        // Draw tiny inner white anchor dot
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (isHovered) {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // Label rendering
      if (showLabels || isSelected || isHovered || (isConnected && activeNode) || isSearchMatch) {
        ctx.fillStyle = (dimByActive || dimByGroup || dimBySearch) ? "rgba(224, 216, 240, 0.25)" : "rgba(224, 216, 240, 0.95)";
        ctx.font = (isSelected || isHovered || isSearchMatch) ? "bold 11px Inter" : "10px Inter";
        ctx.textAlign = "center";
        
        ctx.shadowColor = "rgba(0, 0, 0, 0.85)";
        ctx.shadowBlur = 4;
        ctx.fillText(n.label, n.x, n.y - r - 6);
        ctx.shadowBlur = 0;
      }
    }

    ctx.restore();

    // Stats HUD overlay
    document.getElementById('stats').textContent = `${nodes.length} nút đặc trưng · ${edges.length} liên kết · ${GROUPS.length} nhóm`;
  }

  // ============================================================
  // CAMERA ANIMATION (LERP)
  // ============================================================
  function updateCameraAnimation() {
    if (!targetCam) return;
    
    targetCam.progress += 0.065; // speed multiplier
    if (targetCam.progress >= 1) {
      cam.x = targetCam.x;
      cam.y = targetCam.y;
      cam.zoom = targetCam.zoom;
      targetCam = null;
    } else {
      // Ease out cubic
      const t = targetCam.progress;
      const ease = 1 - Math.pow(1 - t, 3);
      
      cam.x = targetCam.startX + (targetCam.x - targetCam.startX) * ease;
      cam.y = targetCam.startY + (targetCam.y - targetCam.startY) * ease;
      cam.zoom = targetCam.startZoom + (targetCam.zoom - targetCam.startZoom) * ease;
    }
  }

  // Centering on a node in world space
  function centerOnNode(nodeId, targetZoom = 1.25) {
    const node = nodes.find(n => n.id === nodeId);
    if (!node) return;
    
    targetCam = {
      x: node.x,
      y: node.y,
      zoom: targetZoom,
      startX: cam.x,
      startY: cam.y,
      startZoom: cam.zoom,
      progress: 0
    };
  }

  // ============================================================
  // INTERACTION / EVENT HANDLERS
  // ============================================================
  const tooltip = document.getElementById('tooltip');
  let isPanning = false;
  let panStart = { x: 0, y: 0 };
  let camStart = { x: 0, y: 0 };
  let clickStartPos = { x: 0, y: 0 };

  // Find node at world coordinate
  function getNodeAt(wx, wy) {
    for (let i = nodes.length - 1; i >= 0; i--) {
      const n = nodes[i];
      if (!n.visible) continue;
      const dx = wx - n.x;
      const dy = wy - n.y;
      
      const isHL = (selectedNode && n.id === selectedNode.id) || (hoveredNode && n.id === hoveredNode.id);
      const hitRadius = isHL ? 14 : 10;
      
      if (dx * dx + dy * dy < hitRadius * hitRadius) return n;
    }
    return null;
  }

  canvas.addEventListener('mousedown', e => {
    // Avoid triggering drag/pan if clicking UI elements
    clickStartPos.x = e.clientX;
    clickStartPos.y = e.clientY;

    const worldPos = screenToWorld(e.clientX, e.clientY);
    const node = getNodeAt(worldPos.x, worldPos.y);
    
    if (node) {
      draggedNode = node;
      canvas.style.cursor = 'grabbing';
      // Interrupt camera animation when starting to drag
      targetCam = null;
    } else {
      isPanning = true;
      panStart.x = e.clientX;
      panStart.y = e.clientY;
      camStart.x = cam.x;
      camStart.y = cam.y;
      canvas.style.cursor = 'move';
    }
  });

  canvas.addEventListener('mousemove', e => {
    const worldPos = screenToWorld(e.clientX, e.clientY);
    
    if (draggedNode) {
      draggedNode.x = worldPos.x;
      draggedNode.y = worldPos.y;
      draggedNode.vx = 0;
      draggedNode.vy = 0;
      return;
    }

    if (isPanning) {
      const dx = e.clientX - panStart.x;
      const dy = e.clientY - panStart.y;
      cam.x = camStart.x - dx / cam.zoom;
      cam.y = camStart.y - dy / cam.zoom;
      return;
    }

    const node = getNodeAt(worldPos.x, worldPos.y);
    hoveredNode = node;

    if (node) {
      canvas.style.cursor = 'pointer';
      const group = GROUPS[node.group];
      let connCount = 0;
      edges.forEach(e => {
        if (e.source === node.id || e.target === node.id) connCount++;
      });
      tooltip.innerHTML = `
        <div style="font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: ${group.color}; font-weight: 700;">🎯 Yếu tố</div>
        <div class="tt-title" style="color:#fff; margin-top: 2px; margin-bottom: 2px;">${node.label}</div>
        ${node.english ? `<div style="font-size:10.5px; color:#c8b8ff; opacity:0.85; font-style:italic; margin-bottom: 6px;">${node.english}</div>` : ""}
        <div class="tt-group" style="margin-bottom: 8px;">${group.name} · ${connCount} kết nối</div>
        
        <div style="font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 2px;">📝 Mô tả</div>
        <div class="tt-desc" style="margin-bottom: 8px;">${node.desc}</div>
        
        ${node.unit || node.source ? `
        <div style="font-size:11px; padding: 6px 8px; background: rgba(255,255,255,0.03); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px; display: flex; flex-direction: column; gap: 3px;">
          ${node.unit ? `<div><span style="opacity:0.6;">Đơn vị đo:</span> <span style="color:#fff;">${node.unit}</span></div>` : ""}
          ${node.source ? `<div><span style="opacity:0.6;">Nguồn:</span> <span style="color:#c8b8ff;">${node.source}</span></div>` : ""}
        </div>
        ` : ""}
        
        <div style="font-size:10px; opacity:0.5; margin-top:6px; font-style:italic; border-top: 1px solid rgba(255,255,255,0.1); padding-top:4px;">Click để xem chi tiết ${node.pinned ? '📌' : ''}</div>
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';

      // Constraint tooltip boundaries
      const rect = tooltip.getBoundingClientRect();
      if (rect.right > W) tooltip.style.left = (e.clientX - rect.width - 10) + 'px';
      if (rect.bottom > H) tooltip.style.top = (e.clientY - rect.height - 10) + 'px';
    } else {
      canvas.style.cursor = 'grab';
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('mouseup', e => {
    const dx = e.clientX - clickStartPos.x;
    const dy = e.clientY - clickStartPos.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 4) {
      // Small/no movement is recognized as a click
      const worldPos = screenToWorld(e.clientX, e.clientY);
      const node = getNodeAt(worldPos.x, worldPos.y);
      if (node) {
        selectNode(node, e.ctrlKey || e.shiftKey || e.metaKey);
      } else {
        if (!(e.ctrlKey || e.shiftKey || e.metaKey)) {
          clearSelection();
        }
      }
    }
    
    draggedNode = null;
    isPanning = false;
    canvas.style.cursor = 'grab';
  });

  canvas.addEventListener('mouseleave', () => {
    draggedNode = null;
    isPanning = false;
    hoveredNode = null;
    tooltip.style.display = 'none';
  });

  // Double click node to pin/unpin it
  canvas.addEventListener('dblclick', e => {
    const worldPos = screenToWorld(e.clientX, e.clientY);
    const node = getNodeAt(worldPos.x, worldPos.y);
    if (node) {
      node.pinned = !node.pinned;
      if (selectedNode && selectedNode.id === node.id) {
        renderInspector(); // refresh inspector sidebar
      }
    }
  });

  // Zoom at cursor position
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomFactor = 1.12;
    const mouseWorldBefore = screenToWorld(e.clientX, e.clientY);
    
    if (e.deltaY < 0) {
      cam.zoom = Math.min(cam.zoom * zoomFactor, 6);
    } else {
      cam.zoom = Math.max(cam.zoom / zoomFactor, 0.12);
    }
    
    // Shift camera position to keep world cursor locked under screen cursor
    cam.x = mouseWorldBefore.x - (e.clientX - W / 2) / cam.zoom;
    cam.y = mouseWorldBefore.y - (e.clientY - H / 2) / cam.zoom;
    
    targetCam = null; // stop any centering transitions
  }, { passive: false });

  // ============================================================
  // INSPECTOR & ACTIONS
  // ============================================================
  const inspectorEl = document.getElementById('inspector');

  function selectNode(node) {
    selectedNode = node;
    renderInspector();
  }

  function renderInspector() {
    if (!selectedNode) {
      inspectorEl.innerHTML = `
        <div class="inspector-welcome">
          Click vào một nút để xem phân tích chi tiết, các mối liên kết và ghim định vị.
        </div>
      `;
      return;
    }

    const node = selectedNode;
    const group = GROUPS[node.group];
    
    const preds = [];
    const succs = [];
    edges.forEach(e => {
      if (e.target === node.id) {
        const sourceNode = nodes[e.source];
        preds.push({
          id: sourceNode.id,
          label: sourceNode.label,
          color: GROUPS[sourceNode.group].color,
          relType: e.type
        });
      } else if (e.source === node.id) {
        const targetNode = nodes[e.target];
        succs.push({
          id: targetNode.id,
          label: targetNode.label,
          color: GROUPS[targetNode.group].color,
          relType: e.type
        });
      }
    });

    inspectorEl.innerHTML = `
      <div class="inspector-content">
        <div class="inspector-header" style="border-left: 4px solid ${group.color}">
          <span class="group-badge" style="background: ${group.color}20; color: ${group.color}; border: 1px solid ${group.color}40">${group.short}</span>
          <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 700; margin-top: 4px;">🎯 Yếu tố</div>
          <h3 class="inspector-node-title" style="margin-top: 2px;">${node.label}</h3>
          ${node.english ? `<div style="font-size:11px; color:#c8b8ff; opacity:0.85; font-style:italic; margin-top:2px;">${node.english}</div>` : ""}
        </div>
        
        <div>
          <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px;">📝 Mô tả</div>
          <p class="inspector-desc">${node.desc}</p>
        </div>
        
        <div class="inspector-meta" style="font-size:11.5px; display:flex; flex-direction:column; gap:6px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
          ${node.unit ? `<div><span style="opacity:0.65; font-weight: 600;">📏 Đơn vị đo:</span> <span style="color:#fff; font-weight:500;">${node.unit}</span></div>` : ""}
          ${node.source ? `<div><span style="opacity:0.65; font-weight: 600;">📖 Nguồn tham chiếu:</span> <span style="color:#c8b8ff; font-weight:500;">${node.source}</span></div>` : ""}
        </div>

        <div class="inspector-actions">
          <button id="btn-pin-${node.id}" onclick="togglePinNode(${node.id})">${node.pinned ? '🔓 Bỏ ghim' : '📌 Ghim nút'}</button>
          <button onclick="centerOnNode(${node.id}, 1.4)">🎯 Định vị</button>
        </div>
        
        <div class="inspector-connections">
          <h5 class="conn-title">⬅️ Các yếu tố tác động đến (${preds.length})</h5>
          ${preds.length === 0 ? '<div class="no-conn">Không có kết nối trực tiếp</div>' : `
          <div class="conn-list">
            ${preds.map(p => `
              <div class="conn-item" onclick="selectAndCenterNode(${p.id})" style="border-left: 2px solid ${p.color}">
                <span class="conn-label" title="${p.label}">${p.label}</span>
                <span class="conn-type-badge ${p.relType}">${REL_NAMES[p.relType] || p.relType}</span>
              </div>
            `).join('')}
          </div>
          `}
        </div>

        <div class="inspector-connections">
          <h5 class="conn-title">➡️ Các yếu tố bị tác động bởi (${succs.length})</h5>
          ${succs.length === 0 ? '<div class="no-conn">Không có kết nối trực tiếp</div>' : `
          <div class="conn-list">
            ${succs.map(s => `
              <div class="conn-item" onclick="selectAndCenterNode(${s.id})" style="border-left: 2px solid ${s.color}">
                <span class="conn-label" title="${s.label}">${s.label}</span>
                <span class="conn-type-badge ${s.relType}">${REL_NAMES[s.relType] || s.relType}</span>
              </div>
            `).join('')}
          </div>
          `}
        </div>
      </div>
    `;
  }

  function selectAndCenterNode(nodeId) {
    const node = nodes.find(n => n.id === nodeId);
    if (node) {
      selectNode(node);
      centerOnNode(nodeId, 1.45);
    }
  }

  function togglePinNode(nodeId) {
    const node = nodes.find(n => n.id === nodeId);
    if (node) {
      node.pinned = !node.pinned;
      const btn = document.getElementById(`btn-pin-${nodeId}`);
      if (btn) {
        btn.innerHTML = node.pinned ? '🔓 Bỏ ghim' : '📌 Ghim nút';
      }
    }
  }

  function clearSelection() {
    selectedNode = null;
    renderInspector();
  }

  // ============================================================
  // SEARCH HANDLERS
  // ============================================================
  const searchEl = document.getElementById('search');
  const resultsEl = document.getElementById('search-results');

  searchEl.addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase().trim();
    updateSearchResults();
  });

  function updateSearchResults() {
    if (!searchTerm) {
      resultsEl.innerHTML = "";
      return;
    }
    const matches = nodes.filter(n => 
      n.label.toLowerCase().includes(searchTerm) || 
      n.desc.toLowerCase().includes(searchTerm)
    ).slice(0, 10);
    
    if (matches.length === 0) {
      resultsEl.innerHTML = `<div class="search-no-results">Không tìm thấy đặc trưng nào</div>`;
      return;
    }
    
    resultsEl.innerHTML = matches.map(n => {
      const group = GROUPS[n.group];
      return `
        <div class="search-result-item" onclick="selectAndCenterNode(${n.id})">
          <span class="result-dot" style="background:${group.color}"></span>
          <div class="result-details">
            <div class="result-label">${n.label}</div>
            <div class="result-group" style="color:${group.color}">${group.short}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ============================================================
  // BUTTON ACTIONS
  // ============================================================
  function resetView() {
    nodes.forEach(n => {
      const angle = (n.group / GROUPS.length) * Math.PI * 2;
      const r = 260 + Math.random() * 140;
      n.x = Math.cos(angle) * r + (Math.random() - 0.5) * 120;
      n.y = Math.sin(angle) * r + (Math.random() - 0.5) * 120;
      n.vx = 0;
      n.vy = 0;
      n.pinned = false; // unpin all
    });
    
    cam.x = 0;
    cam.y = 0;
    cam.zoom = 0.7;
    targetCam = null;
    
    highlightedGroup = null;
    searchTerm = "";
    searchEl.value = "";
    resultsEl.innerHTML = "";
    clearSelection();
    
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('dimmed'));
  }

  function toggleLabels() {
    showLabels = !showLabels;
  }

  function togglePhysics() {
    physicsOn = !physicsOn;
  }

  // ============================================================
  // INITIALIZATION & ANIMATION LOOP
  // ============================================================
  function loop() {
    simulate();
    updateCameraAnimation();
    draw();
    requestAnimationFrame(loop);
  }

  // ============================================================
  // TABLE VIEW FUNCTIONS & LINKING
  // ============================================================
  let isTableView = false;

  function buildTable() {
    const tbody = document.getElementById('table-body');
    
    // Populate dropdown filter group if empty
    const filterGroup = document.getElementById('table-filter-group');
    if (filterGroup.options.length === 1) {
      GROUPS.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        filterGroup.appendChild(opt);
      });
    }

    tbody.innerHTML = nodes.map(n => {
      const group = GROUPS[n.group];
      
      // Calculate incoming & outgoing connections
      let inCount = 0;
      let outCount = 0;
      edges.forEach(e => {
        if (e.target === n.id) inCount++;
        if (e.source === n.id) outCount++;
      });
      
      return `
        <tr id="tr-node-${n.id}">
          <td style="font-family: monospace; font-weight: bold; color: rgba(255,255,255,0.4);">${n.id}</td>
          <td>
            <div style="font-weight:600; color:#fff; font-size:13px;">${n.label}</div>
            ${n.english ? `<div style="font-size:10.5px; color:#c8b8ff; opacity:0.75; margin-top:2px; font-style:italic;">${n.english}</div>` : ""}
          </td>
          <td>
            <span class="table-badge" style="background: ${group.color}15; color: ${group.color}; border: 1px solid ${group.color}30">${group.name}</span>
          </td>
          <td>
            <div style="line-height: 1.5; color: rgba(224, 216, 240, 0.85);">${n.desc}</div>
          </td>
          <td>
            <div style="color: #eae5f5; font-weight: 500;">${n.unit || "—"}</div>
          </td>
          <td>
            <div style="color: #c8b8ff; opacity: 0.9; font-size: 11.5px; line-height: 1.4;">${n.source || "—"}</div>
          </td>
          <td style="text-align: center;">
            <div style="font-size:11px; opacity:0.9; font-weight: 500; font-family: monospace;">⬅️ ${inCount} | ➡️ ${outCount}</div>
          </td>
          <td style="text-align: center;">
            <button class="table-view-btn" onclick="goToGraphNode(${n.id})">🎯 Đồ thị</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function filterTable() {
    const searchVal = document.getElementById('table-search').value.toLowerCase().trim();
    const groupVal = document.getElementById('table-filter-group').value;
    
    nodes.forEach(n => {
      const row = document.getElementById(`tr-node-${n.id}`);
      if (!row) return;
      
      const group = GROUPS[n.group];
      const matchSearch = n.label.toLowerCase().includes(searchVal) || 
                          n.desc.toLowerCase().includes(searchVal) ||
                          (n.english && n.english.toLowerCase().includes(searchVal)) ||
                          (n.unit && n.unit.toLowerCase().includes(searchVal)) ||
                          (n.source && n.source.toLowerCase().includes(searchVal)) ||
                          group.name.toLowerCase().includes(searchVal);
      const matchGroup = groupVal === "all" || n.group.toString() === groupVal;
      
      if (matchSearch && matchGroup) {
        row.style.display = "";
      } else {
        row.style.display = "none";
      }
    });
  }

  document.getElementById('table-search').addEventListener('input', filterTable);

  function toggleViewMode() {
    isTableView = !isTableView;
    const btn = document.getElementById('btn-view-mode');
    const tableContainer = document.getElementById('table-container');
    
    if (isTableView) {
      buildTable();
      tableContainer.style.display = "flex";
      btn.innerHTML = "🕸️ Dạng Đồ thị";
      btn.style.background = "rgba(140, 120, 255, 0.35)";
      btn.style.borderColor = "rgba(140, 120, 255, 0.8)";
    } else {
      tableContainer.style.display = "none";
      btn.innerHTML = "📊 Dạng Bảng";
      btn.style.background = "rgba(140, 120, 255, 0.12)";
      btn.style.borderColor = "rgba(140, 120, 255, 0.35)";
    }
  }

  function goToGraphNode(nodeId) {
    // Hide table view
    toggleViewMode();
    
    // Highlight and select node in Graph
    setTimeout(() => {
      selectAndCenterNode(nodeId);
    }, 100);
  }

  // Distribute nodes initial circular positions based on group bias around world center (0,0)
  nodes.forEach(n => {
    const angle = (n.group / GROUPS.length) * Math.PI * 2;
    const r = 280 + Math.random() * 120;
    n.x = Math.cos(angle) * r + (Math.random() - 0.5) * 120;
    n.y = Math.sin(angle) * r + (Math.random() - 0.5) * 120;
  });

  // Start the render loop
  loop();
  </script>
</body>
</html>
